server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy to Railway backend
    location /auth {
        proxy_pass https://aiplatform-production-b6bf.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_name aiplatform-production-b6bf.up.railway.app;
        proxy_set_header Host aiplatform-production-b6bf.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /report {
        proxy_pass https://aiplatform-production-b6bf.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_name aiplatform-production-b6bf.up.railway.app;
        proxy_set_header Host aiplatform-production-b6bf.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /skill {
        proxy_pass https://aiplatform-production-b6bf.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_name aiplatform-production-b6bf.up.railway.app;
        proxy_set_header Host aiplatform-production-b6bf.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
